name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build lezer-groq
        run: pnpm --filter @sanity/lezer-groq build

      - name: Typecheck
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

      - name: Install tree-sitter CLI binary
        run: node "$(find node_modules/.pnpm -path '*/tree-sitter-cli/install.js' -print -quit)"

      - name: Run tree-sitter tests
        run: pnpm --filter tree-sitter-groq test
